[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kaivra-voice"
version = "0.1.0"
description = "Voice synthesis providers for kaivra animations"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "kaivra>=0.1.0",
    "elevenlabs>=1.0",
]

[project.optional-dependencies]
local = [
    "sherpa-onnx>=1.0",
]
dev = [
    "pytest>=7.0",
]

[project.entry-points."kaivra.voice_providers"]
elevenlabs = "kaivra_voice.elevenlabs:ElevenLabsProvider"
local = "kaivra_voice.local:LocalProvider"

[tool.hatch.build.targets.wheel]
packages = ["src/kaivra_voice"]

[tool.pytest.ini_options]
testpaths = ["tests"]

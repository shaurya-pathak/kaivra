name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build kaivra distributions
        run: python -m build --sdist --wheel --outdir dist/kaivra .

      - name: Build kaivra-voice distributions
        run: python -m build --sdist --wheel --outdir dist/kaivra-voice packages/kaivra-voice

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/kaivra/*
            dist/kaivra-voice/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kaivra/*
            dist/kaivra-voice/*

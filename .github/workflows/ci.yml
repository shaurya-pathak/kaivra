name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config ffmpeg

      - name: Install project dependencies
        run: uv sync --extra dev

      - name: Install local voice providers
        run: uv pip install --python .venv/bin/python -e "./packages/kaivra-voice"

      - name: Run repo hygiene checks
        run: .venv/bin/python scripts/repo_hygiene.py --check .

      - name: Check formatting
        run: .venv/bin/ruff format --check .

      - name: Run lint checks
        run: .venv/bin/ruff check .

      - name: Compile Python sources
        run: .venv/bin/python -m compileall src tests packages/kaivra-voice/src

      - name: Run test suite
        run: .venv/bin/pytest -q -m "not integration"

      - name: Run doctor
        run: .venv/bin/kaivra doctor

      - name: Run smoke render
        run: .venv/bin/kaivra quick-render examples/algorithms/bubble_sort.json -o artifacts/quick-renders/ci-smoke.png

      - name: Upload smoke render artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-render-py${{ matrix.python-version }}
          path: artifacts/quick-renders/ci-smoke.png
          if-no-files-found: ignore

  changeset:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require changeset for DSL changes
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD")

          DSL_CHANGED=$(echo "$CHANGED" | grep -E "^(src/kaivra/|tests/)" || true)
          if [ -z "$DSL_CHANGED" ]; then
            echo "No DSL files changed — changeset not required."
            exit 0
          fi

          echo "DSL files changed:"
          echo "$DSL_CHANGED"

          CHANGESET=$(echo "$CHANGED" | grep -E "^changes/[^/]+\.md$" || true)
          if [ -z "$CHANGESET" ]; then
            echo ""
            echo "ERROR: This PR modifies DSL files but includes no changeset."
            echo "Add a file under changes/<feature>.md with:"
            echo "  bump: minor"
            echo "  Short description of what changed."
            exit 1
          fi

          echo ""
          echo "Changeset found: $CHANGESET"

  voice-enabled:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config ffmpeg

      - name: Install project dependencies
        run: uv sync --extra dev

      - name: Install local voice providers with Sherpa extras
        run: uv pip install --python .venv/bin/python -e "./packages/kaivra-voice[local]"

      - name: Download local voice model
        run: .venv/bin/kaivra download-model

      - name: Run local voice integration tests
        run: .venv/bin/pytest -q -m integration tests/test_local_voice.py

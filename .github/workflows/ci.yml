name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config ffmpeg

      - name: Install project dependencies
        run: uv sync --extra dev

      - name: Install local voice providers
        run: uv pip install --python .venv/bin/python -e "./packages/kaivra-voice"

      - name: Compile Python sources
        run: .venv/bin/python -m compileall src tests packages/kaivra-voice/src

      - name: Run test suite
        run: .venv/bin/pytest -q

      - name: Run doctor
        run: .venv/bin/kaivra doctor

      - name: Run smoke render
        run: .venv/bin/kaivra quick-render examples/algorithms/bubble_sort.json -o artifacts/quick-renders/ci-smoke.png

      - name: Upload smoke render artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-render
          path: artifacts/quick-renders/ci-smoke.png
          if-no-files-found: ignore

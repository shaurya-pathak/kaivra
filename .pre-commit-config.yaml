minimum_pre_commit_version: "4.0.0"

repos:
  - repo: local
    hooks:
      - id: kaivra-containerized-pytest
        name: kaivra containerized pytest
        entry: scripts/run_containerized_tests.sh
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-commit]

minimum_pre_commit_version: "4.0.0"

repos:
  - repo: local
    hooks:
      - id: kaivra-repo-hygiene
        name: kaivra repo hygiene
        entry: .venv/bin/python scripts/repo_hygiene.py --check .
        language: system
        pass_filenames: false
        always_run: true
      - id: kaivra-ruff-format
        name: kaivra ruff format
        entry: .venv/bin/ruff format --check .
        language: system
        pass_filenames: false
        always_run: true
      - id: kaivra-ruff-check
        name: kaivra ruff check
        entry: .venv/bin/ruff check .
        language: system
        pass_filenames: false
        always_run: true
      - id: kaivra-containerized-pytest
        name: kaivra containerized pytest
        entry: scripts/run_containerized_tests.sh
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-commit]
